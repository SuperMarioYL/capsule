name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Test
        run: pytest -q
      - name: Smoke test the curl-exfil demo (the headline block)
        run: |
          capsule check -p examples/profiles/network-deny.yaml
          # `run` exits 1 when something is blocked — the demo's whole point.
          capsule run -p examples/profiles/network-deny.yaml \
            --skill examples/skills/curl-exfil-demo/SKILL.md || test $? -eq 1
          capsule report
