<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="Capsule — a seccomp-style runtime capability sandbox for installable agent Skills">
  <defs>
    <linearGradient id="cap-h-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6584"/>
      <stop offset="1" stop-color="#FFC65C"/>
    </linearGradient>
    <marker id="hb-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#FF6584"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" fill="#1D1D1F"/>

  <!-- capsule glyph: a pill split into allow (green) / deny (red) halves -->
  <g transform="translate(64,96)">
    <rect x="0" y="0" width="120" height="108" rx="54" fill="#2DC79A" fill-opacity="0.16"/>
    <clipPath id="cap-pill-d"><rect x="0" y="0" width="120" height="108" rx="54"/></clipPath>
    <rect x="60" y="0" width="60" height="108" fill="#FF6584" fill-opacity="0.16" clip-path="url(#cap-pill-d)"/>
    <rect x="0" y="0" width="120" height="108" rx="54" fill="none" stroke="#A1A1A8" stroke-width="2"/>
    <line x1="60" y1="6" x2="60" y2="102" stroke="#3A3A44" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="30" y="60" text-anchor="middle" font-size="22" font-weight="700" fill="#2DC79A">✓</text>
    <text x="90" y="60" text-anchor="middle" font-size="22" font-weight="700" fill="#FF6584">✗</text>
  </g>

  <!-- wordmark -->
  <text x="232" y="120" font-size="58" font-weight="800" fill="#F5F5F7" letter-spacing="-1.5">Capsule</text>
  <text x="234" y="160" font-size="19" font-weight="600" fill="url(#cap-h-d)">seccomp-style runtime sandbox for installable agent Skills</text>
  <text x="234" y="192" font-size="15" font-weight="500" fill="#A1A1A8">Every tool, path &amp; network call a Skill makes is trapped at the call site — deny-by-default.</text>

  <!-- mini call-site flow -->
  <g transform="translate(234,214)">
    <rect x="0" y="0" width="150" height="40" rx="12" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5"/>
    <text x="75" y="25" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B9B6FF">Skill tool call</text>
    <line x1="150" y1="20" x2="196" y2="20" stroke="#3A3A44" stroke-width="1.5" marker-end="url(#hb-d)"/>
    <rect x="200" y="0" width="150" height="40" rx="12" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5"/>
    <text x="275" y="25" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9CCBFF">capability profile</text>
    <line x1="350" y1="20" x2="396" y2="20" stroke="#3A3A44" stroke-width="1.5" marker-end="url(#hb-d)"/>
    <rect x="400" y="0" width="150" height="40" rx="12" fill="#FF6584" fill-opacity="0.16" stroke="#FF6584" stroke-width="1.5"/>
    <text x="475" y="25" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FF9DAF">DENIED at call site</text>
  </g>
</svg>
