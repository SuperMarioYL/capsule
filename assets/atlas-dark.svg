<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="Architecture: a Skill's tool call is reduced to a CallRequest, checked against a capability profile by the policy engine, then allowed through or blocked at the trap and recorded for the report">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/>
    </marker>
    <marker id="ad-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#FF6584"/>
    </marker>
    <marker id="ag-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2DC79A"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#1D1D1F"/>

  <text x="40" y="40" font-size="15" font-weight="700" fill="#F5F5F7">Capsule — call-site enforcement</text>
  <text x="40" y="60" font-size="12" font-weight="500" fill="#A1A1A8">deny-by-default · the disallowed call fails mid-run, not in an after-the-fact audit</text>

  <!-- connectors -->
  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="190" y1="130" x2="250" y2="130" marker-end="url(#ah-d)"/>
    <line x1="430" y1="130" x2="490" y2="130" marker-end="url(#ah-d)"/>
    <line x1="570" y1="160" x2="570" y2="210" marker-end="url(#ah-d)"/>
  </g>
  <g stroke="#2DC79A" stroke-width="1.6" fill="none">
    <path d="M650,130 L740,130 L740,108" marker-end="url(#ag-d)"/>
  </g>
  <g stroke="#FF6584" stroke-width="1.6" fill="none">
    <path d="M650,150 L740,150 L740,210" marker-end="url(#ad-d)"/>
  </g>
  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="740" y1="290" x2="740" y2="312" marker-end="url(#ah-d)"/>
  </g>

  <g>
    <rect x="40" y="100" width="150" height="60" rx="15" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5"/>
    <text x="115" y="126" text-anchor="middle" font-size="13.5" font-weight="600" fill="#B9B6FF">Claude Code</text>
    <text x="115" y="144" text-anchor="middle" font-size="11" font-weight="500" fill="#A1A1A8">host adapter</text>
  </g>
  <g>
    <rect x="250" y="100" width="180" height="60" rx="15" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5"/>
    <text x="340" y="126" text-anchor="middle" font-size="13.5" font-weight="600" fill="#B9B6FF">CallRequest</text>
    <text x="340" y="144" text-anchor="middle" font-size="11" font-weight="500" fill="#A1A1A8">tool · path? · host?</text>
  </g>
  <g>
    <rect x="490" y="100" width="160" height="60" rx="15" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5"/>
    <text x="570" y="126" text-anchor="middle" font-size="13.5" font-weight="600" fill="#9CCBFF">policy engine</text>
    <text x="570" y="144" text-anchor="middle" font-size="11" font-weight="500" fill="#A1A1A8">decide()</text>
  </g>
  <g>
    <rect x="490" y="210" width="160" height="60" rx="15" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5"/>
    <text x="570" y="236" text-anchor="middle" font-size="13.5" font-weight="600" fill="#9CCBFF">capability profile</text>
    <text x="570" y="254" text-anchor="middle" font-size="11" font-weight="500" fill="#A1A1A8">YAML · deny-by-default</text>
  </g>

  <g>
    <rect x="665" y="72" width="150" height="50" rx="14" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.5"/>
    <text x="740" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#2DC79A">ALLOW</text>
    <text x="740" y="110" text-anchor="middle" font-size="10.5" font-weight="500" fill="#A1A1A8">call passes through</text>
  </g>
  <g>
    <rect x="665" y="210" width="150" height="80" rx="14" fill="#FF6584" fill-opacity="0.16" stroke="#FF6584" stroke-width="1.5"/>
    <text x="740" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#FF9DAF">DENY → trap</text>
    <text x="740" y="258" text-anchor="middle" font-size="10.5" font-weight="500" fill="#A1A1A8">call never runs</text>
    <text x="740" y="274" text-anchor="middle" font-size="10.5" font-weight="500" fill="#A1A1A8">DENIED … logged</text>
  </g>
  <g>
    <rect x="640" y="312" width="200" height="38" rx="12" fill="#FFC65C" fill-opacity="0.16" stroke="#FFC65C" stroke-width="1.5"/>
    <text x="740" y="336" text-anchor="middle" font-size="12.5" font-weight="600" fill="#FFC65C">capsule report — allowed vs blocked</text>
  </g>

  <text x="660" y="200" font-size="10.5" font-weight="600" fill="#2DC79A">allow</text>
  <text x="600" y="200" font-size="10.5" font-weight="600" fill="#FF9DAF">deny</text>
</svg>
