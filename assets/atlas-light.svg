<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="Architecture: a Skill's tool call is reduced to a CallRequest, checked against a capability profile by the policy engine, then allowed through or blocked at the trap and recorded for the report">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/>
    </marker>
    <marker id="ad-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E0245E"/>
    </marker>
    <marker id="ag-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#10A37F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <text x="40" y="40" font-size="15" font-weight="700" fill="#1D1D1F">Capsule — call-site enforcement</text>
  <text x="40" y="60" font-size="12" font-weight="500" fill="#6E6E73">deny-by-default · the disallowed call fails mid-run, not in an after-the-fact audit</text>

  <!-- connectors -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="190" y1="130" x2="250" y2="130" marker-end="url(#ah-l)"/>
    <line x1="430" y1="130" x2="490" y2="130" marker-end="url(#ah-l)"/>
    <!-- policy reads profile -->
    <line x1="570" y1="160" x2="570" y2="210" marker-end="url(#ah-l)"/>
  </g>
  <!-- allow path (green) -->
  <g stroke="#10A37F" stroke-width="1.6" fill="none">
    <path d="M650,130 L740,130 L740,108" marker-end="url(#ag-l)"/>
  </g>
  <!-- deny path (red) -->
  <g stroke="#E0245E" stroke-width="1.6" fill="none">
    <path d="M650,150 L740,150 L740,210" marker-end="url(#ad-l)"/>
  </g>
  <!-- trap -> report -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="740" y1="290" x2="740" y2="312" marker-end="url(#ah-l)"/>
  </g>

  <!-- Host adapter -->
  <g>
    <rect x="40" y="100" width="150" height="60" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="115" y="126" text-anchor="middle" font-size="13.5" font-weight="600" fill="#4B3FC4">Claude Code</text>
    <text x="115" y="144" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">host adapter</text>
  </g>
  <!-- CallRequest -->
  <g>
    <rect x="250" y="100" width="180" height="60" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="340" y="126" text-anchor="middle" font-size="13.5" font-weight="600" fill="#4B3FC4">CallRequest</text>
    <text x="340" y="144" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">tool · path? · host?</text>
  </g>
  <!-- Policy engine -->
  <g>
    <rect x="490" y="100" width="160" height="60" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="570" y="126" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0A4F9E">policy engine</text>
    <text x="570" y="144" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">decide()</text>
  </g>
  <!-- Capability profile -->
  <g>
    <rect x="490" y="210" width="160" height="60" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="570" y="236" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0A4F9E">capability profile</text>
    <text x="570" y="254" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">YAML · deny-by-default</text>
  </g>

  <!-- ALLOW -->
  <g>
    <rect x="665" y="72" width="150" height="50" rx="14" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5"/>
    <text x="740" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#0B6B53">ALLOW</text>
    <text x="740" y="110" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6E6E73">call passes through</text>
  </g>
  <!-- DENY / trap -->
  <g>
    <rect x="665" y="210" width="150" height="80" rx="14" fill="#E0245E" fill-opacity="0.12" stroke="#E0245E" stroke-width="1.5"/>
    <text x="740" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#B01545">DENY → trap</text>
    <text x="740" y="258" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6E6E73">call never runs</text>
    <text x="740" y="274" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6E6E73">DENIED … logged</text>
  </g>
  <!-- report -->
  <g>
    <rect x="640" y="312" width="200" height="38" rx="12" fill="#F5A623" fill-opacity="0.14" stroke="#F5A623" stroke-width="1.5"/>
    <text x="740" y="336" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9A6500">capsule report — allowed vs blocked</text>
  </g>

  <text x="660" y="200" font-size="10.5" font-weight="600" fill="#0B6B53">allow</text>
  <text x="600" y="200" font-size="10.5" font-weight="600" fill="#B01545">deny</text>
  <text x="585" y="195" font-size="10" font-weight="500" fill="#6E6E73" transform="rotate(90 585 195)"></text>
</svg>
